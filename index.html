<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Bot Vendedor</title>
    <!-- Tailwind CSS (CDN para copiar y pegar rápido) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome para íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .hidden-view { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold"><i class="fa-solid fa-robot mr-2"></i>Panel Bot Vendedor</h1>
        <div id="nav-user-menu" class="hidden-view flex items-center gap-4">
            <span id="user-email-display" class="text-sm font-medium"></span>
            <button id="btn-logout" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded text-sm font-bold shadow transition">Salir</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-8 p-4">

        <!-- ============================================== -->
        <!-- VISTA: LOGIN / REGISTRO -->
        <!-- ============================================== -->
        <div id="view-auth" class="bg-white p-8 rounded-lg shadow-md max-w-md mx-auto">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Acceso al Sistema</h2>
            
            <div id="auth-message" class="hidden-view mb-4 p-3 bg-red-100 text-red-700 rounded text-sm text-center"></div>

            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">Correo Electrónico</label>
                <input type="email" id="auth-email" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 font-bold mb-2">Contraseña</label>
                <input type="password" id="auth-password" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div class="flex gap-4">
                <button id="btn-login" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow transition">Ingresar</button>
                <button id="btn-register" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded shadow transition">Registrarse</button>
            </div>
        </div>

        <!-- ============================================== -->
        <!-- VISTA: DASHBOARD (CONFIGURACIÓN DEL NEGOCIO) -->
        <!-- ============================================== -->
        <div id="view-dashboard" class="hidden-view space-y-6">
            
            <!-- SECCIÓN: IDENTIDAD Y DATOS -->
            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-500">
                <h3 class="text-lg font-bold mb-4 text-gray-800"><i class="fa-solid fa-store mr-2"></i>Datos del Negocio y Personalidad del Bot</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 font-bold mb-2">Nombre de la Empresa</label>
                        <input type="text" id="tienda-nombre" class="w-full p-2 border rounded" placeholder="Ej: Inversiones CriptoVes">
                    </div>
                    <div>
                        <!-- NUEVO CAMPO: NOMBRE DEL VENDEDOR -->
                        <label class="block text-gray-700 font-bold mb-2">Nombre del Vendedor (IA)</label>
                        <input type="text" id="tienda-vendedor" class="w-full p-2 border border-blue-300 bg-blue-50 rounded" placeholder="Ej: Luis, Carlos, Asesor VIP">
                        <p class="text-xs text-gray-500 mt-1">Con este nombre se presentará la IA a tus clientes.</p>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-bold mb-2">Teléfono de Contacto</label>
                        <input type="text" id="tienda-telefono" class="w-full p-2 border rounded" placeholder="Ej: +58 412 0000000">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-bold mb-2">Horario de Atención</label>
                        <input type="text" id="tienda-horario" class="w-full p-2 border rounded" placeholder="Ej: Lunes a Sábado de 8am a 5pm">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-gray-700 font-bold mb-2">Dirección Física</label>
                        <input type="text" id="tienda-direccion" class="w-full p-2 border rounded" placeholder="Ej: Maracay, Av. Principal...">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-gray-700 font-bold mb-2">Redes Sociales (Opcional)</label>
                        <input type="text" id="tienda-redes" class="w-full p-2 border rounded" placeholder="Ej: Instagram: @tiendaejemplo">
                    </div>
                </div>
            </div>

            <!-- SECCIÓN: API KEY GEMINI -->
            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-purple-500">
                <h3 class="text-lg font-bold mb-4 text-gray-800"><i class="fa-solid fa-key mr-2"></i>Conexión con Gemini AI</h3>
                <div>
                    <label class="block text-gray-700 font-bold mb-2">API Key de Google Gemini</label>
                    <input type="password" id="tienda-apikey" class="w-full p-2 border rounded font-mono" placeholder="Pega aquí la API Key generada en Google AI Studio">
                </div>
            </div>

            <!-- SECCIÓN: INVENTARIO / CATÁLOGO -->
            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-green-500">
                <h3 class="text-lg font-bold mb-4 text-gray-800"><i class="fa-solid fa-box-open mr-2"></i>Catálogo de Productos</h3>
                
                <div class="flex flex-col md:flex-row gap-4 mb-6 bg-gray-50 p-4 rounded border">
                    <div class="flex-1">
                        <label class="block text-gray-700 font-bold mb-1 text-sm">Artículo / Servicio</label>
                        <input type="text" id="prod-nombre" class="w-full p-2 border rounded" placeholder="Ej: Punto de Venta Android">
                    </div>
                    <div class="w-full md:w-32">
                        <label class="block text-gray-700 font-bold mb-1 text-sm">Precio ($)</label>
                        <input type="number" id="prod-precio" class="w-full p-2 border rounded" placeholder="10.00" step="0.01">
                    </div>
                    <div class="flex items-end">
                        <button id="btn-add-product" class="w-full md:w-auto bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded shadow transition">
                            <i class="fa-solid fa-plus mr-1"></i> Añadir
                        </button>
                    </div>
                </div>

                <div class="overflow-x-auto rounded border">
                    <table class="min-w-full bg-white text-left text-sm">
                        <thead class="bg-gray-100 text-gray-700">
                            <tr>
                                <th class="px-4 py-3 font-bold border-b">Artículo</th>
                                <th class="px-4 py-3 font-bold border-b w-32">Precio</th>
                                <th class="px-4 py-3 font-bold border-b w-20 text-center">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-list">
                            <!-- JS inyecta productos aquí -->
                        </tbody>
                    </table>
                    <div id="empty-inventory" class="text-center p-6 text-gray-500 italic">
                        No hay productos en el catálogo.
                    </div>
                </div>
            </div>

            <!-- SECCIÓN: GUARDAR TODO -->
            <div class="bg-gray-50 p-6 rounded-lg shadow-md flex items-center justify-between border">
                <div id="save-message" class="hidden-view text-green-600 font-bold bg-green-100 px-4 py-2 rounded">
                    ¡Datos guardados! Prompt actualizado.
                </div>
                <button id="btn-save-config" class="ml-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded shadow-lg text-lg transition transform hover:scale-105">
                    Guardar y Actualizar Bot
                </button>
            </div>

        </div>
    </main>

    <!-- Script de la aplicación -->
    <script type="module" src="app.js"></script>
</body>
                          </html>
